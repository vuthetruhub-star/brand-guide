<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>[COMPANY_NAME] — Button Components</title>
  <style>
    /* Import your design system tokens */
    /* @import url('../design-system/colors.css'); */
    /* @import url('../design-system/typography.css'); */

    /* ======================================
       BUTTON SYSTEM
       Replace values with your brand tokens
       ====================================== */

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;

      /* ---- CUSTOMIZE THESE ---- */
      font-family: '[Your Font]', sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;       /* Adjust: 0 for normal, 0.05-0.1em for caps */
      text-transform: uppercase;     /* Options: uppercase | capitalize | none */
      border-radius: 0px;           /* Adjust: 0 for sharp, 4-8px for rounded */
    }

    /* Sizes */
    .btn-sm { height: 32px; padding: 0 16px; font-size: 12px; }
    .btn-md { height: 40px; padding: 0 24px; font-size: 14px; }
    .btn-lg { height: 48px; padding: 0 32px; font-size: 16px; }

    /* Primary */
    .btn-primary {
      background: #______;          /* var(--color-primary) */
      color: #______;               /* Text color on primary */
    }
    .btn-primary:hover {
      background: #______;          /* var(--color-primary-hover) */
    }

    /* Secondary */
    .btn-secondary {
      background: transparent;
      color: #______;               /* var(--color-text-primary) */
      border: 1px solid #______;    /* var(--color-border) */
    }
    .btn-secondary:hover {
      background: #______;          /* Subtle hover bg */
    }

    /* Ghost */
    .btn-ghost {
      background: transparent;
      color: #______;               /* var(--color-accent) */
    }
    .btn-ghost:hover {
      background: #______;          /* Very subtle hover */
      text-decoration: underline;   /* Or remove this */
    }

    /* ---- Preview Layout (not part of system) ---- */
    body {
      padding: 48px;
      background: #______;          /* Your bg color */
      color: #______;               /* Your text color */
      font-family: sans-serif;
    }
    .preview-row {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }
    .label {
      font-size: 12px;
      opacity: 0.5;
      width: 100px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <h2>Button Components</h2>

  <div class="preview-row">
    <span class="label">Primary</span>
    <button class="btn btn-primary btn-sm">Small</button>
    <button class="btn btn-primary btn-md">Medium</button>
    <button class="btn btn-primary btn-lg">Large</button>
  </div>

  <div class="preview-row">
    <span class="label">Secondary</span>
    <button class="btn btn-secondary btn-sm">Small</button>
    <button class="btn btn-secondary btn-md">Medium</button>
    <button class="btn btn-secondary btn-lg">Large</button>
  </div>

  <div class="preview-row">
    <span class="label">Ghost</span>
    <button class="btn btn-ghost btn-sm">Small</button>
    <button class="btn btn-ghost btn-md">Medium</button>
    <button class="btn btn-ghost btn-lg">Large</button>
  </div>
</body>
</html>
